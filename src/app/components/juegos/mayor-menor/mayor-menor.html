<div class="pagina">
  <div class="tarjeta">
    <h1 class="titulo">MAYOR O MENOR</h1>
    <p class="descripcion">Aciertos: {{ aciertos }}</p>

    <div class="carta">
      <span class="carta-numero">{{ cartaActual.numero }}</span>
      <span class="carta-palo">{{ cartaActual.palo }}</span>
    </div>

    @if (mensaje) {
    <p class="descripcion">{{ mensaje }}</p>
    }

    @if (juegoTerminado()) {
    <div class="modal-fondo">
      <div class="modal-tarjeta">
        <p class="modal-mensaje">{{ mensajeModal() }}</p>
        <div style="display:flex; gap:12px; justify-content:center">
          <button class="boton-principal" (click)="reiniciar()">JUGAR DE NUEVO</button>
          <button class="boton-secundario" routerLink="/home">VOLVER AL HOME</button>
        </div>
      </div>
    </div>
    } @else {
    <div class="botones-eleccion">
      <button class="boton" (click)="adivinar('mayor')">⬆ MAYOR</button>
      <button class="boton-secundario" (click)="adivinar('menor')">⬇ MENOR</button>
    </div>
    }
  </div>
</div>
